<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Js Project</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <h1 class="text-center">Expense tracker App</h1>
    <form onsubmit="saveToLocalStorage(event)">
      <div class="row">
        <div class="col">
          <label for="number" class="col-sm-2 col-form-label"> Expenses</label>
          <input type="number" id="Expenses" class="col-9" name="number" required />
        </div>
        <div class="col">
          <label for="description" class="col-sm-2 col-form-label">
            Description</label
          >
          <input
            type="text"
            id="description"
            class="col-auto"
            name="decription"
            required />
        </div>
        <div class="col-auto my-1">
          <label class="mr-sm-2" for="inlineFormCustomSelect">Preference</label>
          <select
            class="custom-select custom-select-lg mb-3"
            id="inlineFormCustomSelect"
            name="category"
          >
            <option selected>Choose...</option>
            <option value="Grocery">Grocery</option>
            <option value="Clothes">Clothes</option>
            <option value="Bills">Bills</option>
          </select>
        </div>
        <div class="col-auto my-1">
          <button type="submit" class="btn btn-primary">
            Submit
          </button>
        </div>
      </div>
    </form>
    <ul id="listOfUsers" class="list-group"></ul>
    <script>
      function saveToLocalStorage(event) {
        event.preventDefault();
        const Expenses = event.target.number.value;
        const Description = event.target.description.value;
        const category = event.target.category.value

        const obj = {
          Expenses,
          Description,
        category,
        };
        console.log(obj);
        localStorage.setItem(obj.Expenses, JSON.stringify(obj));
        showNewUserOnScreen(obj);
      }

      window.addEventListener("DOMContentLoaded", () => {
        const localStorageObj = localStorage;
        const localstoragekeys = Object.keys(localStorageObj);

        for (var i = 0; i < localstoragekeys.length; i++) {
          const key = localstoragekeys[i];
          const userDetailsString = localStorageObj[key];
          const userDetailsObj = JSON.parse(userDetailsString);
          showNewUserOnScreen(userDetailsObj);
        }
      });

      function showNewUserOnScreen(user) {
        document.getElementById("Expenses").value = "";
        document.getElementById("description").value = "";
        document.getElementById("inlineFormCustomSelect").value = "";
        
        // console.log(localStorage.getItem(user.emailId))
        if (localStorage.getItem(user.Expenses) !== null) {
          removeUserFromScreen(user.Expenses);
        }

        const parentNode = document.getElementById("listOfUsers");
        const childHTML = `<li class="list-group-item" id=${user.Expenses}> ${user.Expenses} - ${user.Description} - ${user.category}
                                        <button class="btn btn-danger float-right" onclick=deleteUser('${user.Expenses}')> Delete User </button>
                                        <button class="btn btn-success float-right" onclick=editUserDetails('${user.Expenses}','${user.Description}')>Edit User </button>
                                     </li>`;

        parentNode.innerHTML = parentNode.innerHTML + childHTML;
      }

      function editUserDetails(Expenses, Description) {
        document.getElementById("Expenses").value = Expenses;
        document.getElementById("description").value = Description;
        // document.getElementById("phonenumber").value = phonenumber;

        deleteUser(Expenses);
      }

      function deleteUser(Expenses) {
        console.log(Expenses);
        localStorage.removeItem(Expenses);
        removeUserFromScreen(Expenses);
      }

      function removeUserFromScreen(Expenses) {
        const parentNode = document.getElementById("listOfUsers");
        const childNodeToBeDeleted = document.getElementById(Expenses);
        if (childNodeToBeDeleted) {
          parentNode.removeChild(childNodeToBeDeleted);
        }
      }

    </script>
  </body>
</html>
